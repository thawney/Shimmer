<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@700&family=Modak&display=swap" rel="stylesheet">
  <!-- Inherit design tokens (colors, fonts, sliders, selects) from main stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- CodeMirror 5 — MIT licensed, plain script tags, no build step required -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <!-- Custom "shimmer" CodeMirror theme — matches site palette -->
  <style>
    .cm-s-shimmer.CodeMirror                      { background: #1e1e1e; color: #e8e4da; }
    .cm-s-shimmer .CodeMirror-gutters             { background: #181818; border-right: 1px solid rgba(255,198,10,0.1); }
    .cm-s-shimmer .CodeMirror-linenumber          { color: #5a5040; }
    .cm-s-shimmer .CodeMirror-cursor              { border-left: 2px solid #ffc60a; }
    .cm-s-shimmer .CodeMirror-selected            { background: rgba(255,198,10,0.14); }
    .cm-s-shimmer.CodeMirror-focused .CodeMirror-selected { background: rgba(255,198,10,0.18); }
    .cm-s-shimmer .CodeMirror-activeline-background { background: rgba(255,255,255,0.03); }
    .cm-s-shimmer .CodeMirror-matchingbracket     { color: #ffc60a !important; font-weight: bold; }

    .cm-s-shimmer .cm-keyword     { color: #ffc60a; }
    .cm-s-shimmer .cm-operator    { color: #ffc60a; }
    .cm-s-shimmer .cm-def         { color: #ffe080; }
    .cm-s-shimmer .cm-string      { color: #98c878; }
    .cm-s-shimmer .cm-string-2    { color: #98c878; }
    .cm-s-shimmer .cm-number      { color: #f09060; }
    .cm-s-shimmer .cm-comment     { color: #706050; font-style: italic; }
    .cm-s-shimmer .cm-variable    { color: #e8e4da; }
    .cm-s-shimmer .cm-variable-2  { color: #d0c898; }
    .cm-s-shimmer .cm-property    { color: #d4b870; }
    .cm-s-shimmer .cm-atom        { color: #f0a040; }
    .cm-s-shimmer .cm-builtin     { color: #c8a050; }
    .cm-s-shimmer .cm-punctuation { color: #a09080; }
    .cm-s-shimmer .cm-tag         { color: #ffc60a; }
    .cm-s-shimmer .cm-attribute   { color: #ffe080; }
    .cm-s-shimmer .cm-error       { color: #ff5555; background: rgba(255,85,85,0.1); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <style>
    /* ── Full-screen IDE layout ─────────────────────────────────────────────── */
    html { height: 100%; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      /* override the min-height from style.css */
      min-height: unset;
    }

    /* ── Simulator header ───────────────────────────────────────────────────── */
    .sim-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(35,35,35,0.97), rgba(45,45,45,0.93));
      border-bottom: 2px solid rgba(255,198,10,0.5);
      backdrop-filter: blur(4px);
      flex-shrink: 0;
      flex-wrap: wrap;
      position: relative;
      z-index: 20;
    }

    .sim-title-block {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .sim-title-block h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      color: var(--accent-yellow);
    }

    .sim-subtitle {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-soft);
      opacity: 0.7;
    }

    .sim-header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .home-link {
      color: var(--ink-soft);
      font-size: 12px;
      text-decoration: none;
      height: 36px;
      border: 2px solid rgba(255,198,10,0.4);
      border-radius: var(--pill);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
    }
    .home-link:hover { color: var(--accent-yellow); border-color: var(--accent-yellow); }

    .sim-header select {
      height: 36px;
      border: 2px solid var(--line);
      background: #2a2a2a;
      color: var(--ink);
      border-radius: var(--pill);
      padding: 0 10px;
      font: inherit;
      font-size: 13px;
    }

    /* ── Main split area ────────────────────────────────────────────────────── */
    .sim-main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* ── LED grid panel (left) ──────────────────────────────────────────────── */
    .grid-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #0c0c0c;
      border-right: 2px solid rgba(255,198,10,0.15);
      overflow: hidden;
    }

    #grid-canvas {
      display: block;
      /* Square, sized to fit available space */
      width: min(100%, calc(100vh - 220px));
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      box-shadow:
        0 0 0 2px rgba(255,198,10,0.15),
        0 0 60px rgba(0,0,0,0.6);
    }

    /* ── Script editor panel (right) ────────────────────────────────────────── */
    .editor-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #111;
    }

    .editor-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      background: #181818;
      border-bottom: 1px solid rgba(255,198,10,0.15);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .editor-toolbar select {
      flex: 1;
      min-width: 0;
      height: 36px;
      border: 2px solid var(--line);
      border-radius: var(--pill);
      padding: 0 10px;
      font: inherit;
      font-size: 13px;
      color: var(--ink);
      background: #2a2a2a;
    }

    .btn-run {
      height: 36px;
      background: var(--accent-yellow);
      color: #0d0d0b;
      border: none;
      border-radius: var(--pill);
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.12s ease;
    }
    .btn-run:hover { opacity: 0.85; }

    .btn-stop {
      height: 36px;
      background: #2a2a2a;
      color: var(--ink);
      border: 2px solid var(--line);
      border-radius: var(--pill);
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s ease;
    }
    .btn-stop:hover { background: #3a3a3a; }

    #editor-container {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* CodeMirror 5 fill */
    #editor-container .CodeMirror {
      height: 100%;
      font-size: 13px;
      font-family: "Anonymous Pro", "Courier New", monospace;
      background: #1e1e1e;
    }
    #editor-container .CodeMirror-scroll {
      height: 100%;
    }

    /* ── Bottom controls bar ────────────────────────────────────────────────── */
    .sim-controls {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 7px 16px;
      background: #1a1a1a;
      border-top: 2px solid rgba(255,198,10,0.25);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* Override the 3-column grid label from style.css */
    .sim-controls label {
      display: inline-flex !important;
      align-items: center;
      gap: 6px;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .sim-controls select {
      height: 28px;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 0 8px;
      background: #2a2a2a;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
    }

    .sim-controls input[type="range"] {
      width: 80px;
      height: 8px;
    }

    .sim-controls output {
      min-width: 26px;
      font-weight: 700;
      color: var(--ink);
      font-size: 12px;
      text-align: right;
    }

    #sim-status {
      margin-left: auto;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: var(--pill);
      background: #252525;
    }
    .sim-status-running { color: #6bff9e; }
    .sim-status-error   { color: #ff6b6b; }
    .sim-status-idle    { color: var(--ink-soft); }

    /* ── Focus outlines ─────────────────────────────────────────────────────── */
    .editor-toolbar select:focus,
    .editor-toolbar button:focus,
    .sim-header select:focus,
    .home-link:focus,
    .sim-controls select:focus,
    .sim-controls input[type="range"]:focus {
      outline: 3px solid rgba(255,198,10,0.45);
      outline-offset: 1px;
    }

    /* ── Responsive: stack panels on narrow screens ─────────────────────────── */
    @media (max-width: 800px) {
      .sim-main {
        grid-template-columns: 1fr;
        grid-template-rows: 38vh 1fr;
      }
      .grid-panel {
        border-right: none;
        border-bottom: 2px solid rgba(255,198,10,0.15);
        padding: 10px;
      }
      #grid-canvas {
        width: min(100%, 38vh);
      }
    }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <div class="sim-header">
    <div class="sim-title-block">
      <h1>Shimmer</h1>
      <span class="sim-subtitle">Simulator</span>
    </div>
    <div class="sim-header-right">
      <label class="port-label" style="display:inline-flex;gap:6px;align-items:center;">
        MIDI out
        <select id="sim-midi-port"><option value="">-- none (visual only) --</option></select>
      </label>
      <a href="index.html" class="home-link">← Device</a>
    </div>
  </div>

  <!-- ── Main: LED grid (left) + Editor (right) ─────────────────────────────── -->
  <main class="sim-main">

    <div class="grid-panel">
      <canvas id="grid-canvas" width="600" height="600"></canvas>
    </div>

    <div class="editor-panel">
      <div class="editor-toolbar">
        <select id="sim-mode-select">
          <option value="">-- load a built-in script --</option>
        </select>
        <button class="btn-run"  id="btn-run">▶ Run</button>
        <button class="btn-stop" id="btn-stop">■ Stop</button>
      </div>
      <div id="editor-container"></div>
    </div>

  </main>

  <!-- ── Controls bar ───────────────────────────────────────────────────────── -->
  <div class="sim-controls">
    <label>Scale
      <select id="sim-scale">
        <option value="0">Major</option>
        <option value="1">Minor</option>
        <option value="2">Dorian</option>
        <option value="3" selected>Pentatonic</option>
        <option value="4">Chromatic</option>
      </select>
    </label>
    <label>Root
      <select id="sim-root"><!-- populated by JS --></select>
    </label>
    <label>Tempo
      <input type="range" id="sim-tempo" min="1" max="240" value="120">
      <output id="sim-tempo-val">120</output>
    </label>
    <label>Brightness
      <input type="range" id="sim-brightness" min="0" max="255" value="200">
      <output id="sim-brightness-val">200</output>
    </label>
    <label>
      <span id="sim-param-label">Amount</span>
      <input type="range" id="sim-param" min="0" max="255" value="128">
      <output id="sim-param-val">128</output>
    </label>
    <label>MIDI Ch
      <select id="sim-channel"><!-- populated by JS --></select>
    </label>
    <span id="sim-status" class="sim-status-idle">Stopped</span>
  </div>

  <script src="simulator.js"></script>
</body>
</html>
